# =============================
# Spring Boot App Name
# =============================
spring.application.name=spring-ai-rag-db

# =============================
# Ollama AI Configuration
# =============================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=phi3:latest
spring.ai.ollama.embedding.enabled=true
spring.ai.ollama.embedding.options.model=phi3:latest

# =============================
# MySQL / XAMPP Configuration
# =============================
spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai
spring.datasource.username=root
spring.datasource.password=

# =============================
# JPA Settings
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# Server Port
# =============================
server.port=8081